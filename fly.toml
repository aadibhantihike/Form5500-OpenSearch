# Fly.io app configuration. Edit `app` to your unique app name and run:
#   fly launch --no-deploy --copy-config
#   fly volumes create efast_data --region iad --size 3
#   fly deploy
app = "efast-broker-search"
primary_region = "iad"

[build]

[env]
  EFAST_DB_PATH = "/data/efast.db"
  # Set EFAST_CORS_ORIGINS via `fly secrets set` to your Vercel domain(s),
  # e.g. fly secrets set EFAST_CORS_ORIGINS="https://efast.vercel.app"
  EFAST_RATE_LIMIT = "60/minute"
  EFAST_BULK_RATE_LIMIT = "10/minute"

[[mounts]]
  source = "efast_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 25
    hard_limit = 50

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "60s"
  method = "GET"
  path = "/healthz"

# 1 GB RAM / 1 shared CPU is plenty for SQLite + FTS5 against ~350MB DB.
# Bump to performance-1x or shared-cpu-2x if concurrency climbs.
[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
