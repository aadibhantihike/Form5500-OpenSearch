# fly.toml app configuration file generated for efast-broker-search on 2026-04-25T18:49:33-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'efast-broker-search'
primary_region = 'iad'

[build]

[env]
  EFAST_BULK_RATE_LIMIT = '10/minute'
  EFAST_DB_PATH = '/data/efast.db'
  EFAST_RATE_LIMIT = '60/minute'

[[mounts]]
  source = 'efast_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 25

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
